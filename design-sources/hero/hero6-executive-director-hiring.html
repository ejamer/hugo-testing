<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:2000px; height:800px; overflow:hidden; }
  body {
    font-family: 'Noto Sans Display', 'Noto Sans', Arial, sans-serif;
    position: relative;
    background: #004840;
  }
  .bgpattern {
    position:absolute; inset:0;
    background-image:
      linear-gradient(45deg, rgba(255,255,255,0.025) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.025) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.025) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.025) 75%);
    background-size: 60px 60px;
    background-position: 0 0, 0 30px, 30px -30px, -30px 0;
  }
  .edge {
    position:absolute; left:0; top:0; bottom:0; width:26px;
    background: linear-gradient(180deg, #79242f, #5e1c26);
    z-index: 2;
  }
  .panel-right {
    position:absolute; top:0; right:0; bottom:0; width:760px;
    background: linear-gradient(160deg, #79242f 0%, #5e1c26 100%);
    clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
    display:flex; align-items:center; justify-content:center;
    padding: 0 70px 0 130px;
  }
  .panel-right img { width: 100%; height: auto; opacity: 0.97; }
  .row {
    position:relative; z-index:1; height:100%;
    display:flex; align-items:center;
    padding: 0 60px 0 110px;
    max-width: 1260px;
  }
  .kicker {
    display:inline-flex;
    background: rgba(0,0,0,0.22);
    border: 2px solid rgba(255,255,255,0.55);
    color: #fff;
    font-size: 23px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
    padding: 9px 24px; border-radius: 28px; margin-bottom: 34px;
  }
  h1 {
    font-size: 68px; font-weight:700; line-height:1.14; letter-spacing:-0.005em;
    color:#ffffff; text-shadow: 0 4px 20px rgba(0,0,0,0.22);
  }
  h1 .title {
    display:block;
    font-style: italic;
    color:#ffffff;
    -webkit-text-stroke: 1.75px #ffffff;
    text-shadow:
      -1px -1px 0 rgba(0,0,0,0.4), 1px -1px 0 rgba(0,0,0,0.4),
      -1px  1px 0 rgba(0,0,0,0.4), 1px  1px 0 rgba(0,0,0,0.4),
      0 6px 20px rgba(0,0,0,0.45);
  }
  h1.fr { margin-top: 26px; }
  .tagline { margin-top: 30px; }
  .tagline p {
    font-size: 27px; font-weight:600; color: rgba(255,255,255,0.9); line-height:1.5;
  }
  .tagline p.fr { margin-top: 6px; }
  .tagline .dot { color: #e3798c; margin: 0 14px; font-weight:700; }
</style>
</head>
<body>
  <div class="bgpattern"></div>
  <div class="edge"></div>
  <div class="panel-right">
    <img src="file:///home/edjamer/Documents/GitHub/hugo-testing/fenb-1/static/images/fenb-logo/FENB-Logo-Small-White/FencingNB-Logo-Small-OneColour-White.svg">
  </div>
  <div class="row">
    <div>
      <span class="kicker">Fencing&#8209;Escrime NB</span>

      <h1>Nous embauchons notre prochain<span class="title">directeur g&eacute;n&eacute;ral</span></h1>
      <div class="tagline">
        <p>Contrat &agrave; temps partiel<span class="dot">&middot;</span>Nouveau&#8209;Brunswick<span class="dot">&middot;</span>Date limite : 31 juillet 2026</p>
      </div>

      <h1 class="fr">We're hiring our next<span class="title">Executive Director</span></h1>
      <div class="tagline">
        <p class="fr">Part&#8209;time contract<span class="dot">&middot;</span>New Brunswick<span class="dot">&middot;</span>Apply by July 31, 2026</p>
      </div>
    </div>
  </div>
</body>
</html>
