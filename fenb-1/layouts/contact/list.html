{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<section class="fenb-about-contact-section">
  <div class="fenb-container fenb-container--tight">
    <span class="fenb-section-label">{{ i18n "about_contact_label" }}</span>
    <h2 class="fenb-section-title">{{ i18n "about_contact_title" }}</h2>
    <form class="fenb-contact-form" action="mailto:{{ hugo.Data.board_members.contact }}" method="POST" enctype="text/plain">
      <div class="fenb-contact-form-row">
        <label for="contact-name">{{ i18n "about_contact_name" }}</label>
        <input type="text" id="contact-name" name="{{ i18n "about_contact_name" }}" required>
      </div>
      <div class="fenb-contact-form-row">
        <label for="contact-email">{{ i18n "about_contact_email" }}</label>
        <input type="email" id="contact-email" name="{{ i18n "about_contact_email" }}" required>
      </div>
      <div class="fenb-contact-form-row">
        <label for="contact-message">{{ i18n "about_contact_message" }}</label>
        <textarea id="contact-message" name="{{ i18n "about_contact_message" }}" rows="5" required></textarea>
      </div>
      <button type="submit" class="fenb-contact-form-submit">{{ i18n "about_contact_submit" }}</button>
    </form>
  </div>
</section>
{{ end }}
