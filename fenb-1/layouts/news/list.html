{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<section class="fenb-section fenb-news-index-section">
  <div class="fenb-container">
    <div class="fenb-news-grid">
      {{ range ($.Paginate (sort .RegularPagesRecursive "Date" "desc")).Pages }}
      {{ partial "news-card.html" (dict "page" . "heading" "h2" "truncate" 160) }}
      {{ end }}
    </div>
    {{ partial "pagination.html" . }}
  </div>
</section>
{{ end }}
