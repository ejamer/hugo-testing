programs_athlete_factor_7:            "Periodization"
programs_athlete_factor_8:            "Competition Planning"
programs_athlete_factor_9:            "System Alignment and Integration"
programs_athlete_factor_10:           "Continuous Improvement"
programs_athlete_pathway_label:       "Development Pathways"
programs_athlete_pathway_title:       "A sport for every level"
programs_athlete_pathway_intro:       "Fencing in New Brunswick is open to everyone — from those who want to stay active and try something new, to athletes with aspirations to compete on the national and international stage. The sport offers a clear development pathway with opportunities at every level."
programs_athlete_pathway_step_1:      "Recreational"
programs_athlete_pathway_step_2:      "Competitive"
programs_athlete_pathway_step_3:      "Provincial Team"
