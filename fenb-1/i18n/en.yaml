# ── About page ─────────────────────────────────────────────
about_overview_label:     "Our Organization"
about_overview_title:     "Fencing-Escrime NB"
about_overview_body:      "Fencing-Escrime NB (FENB) is the provincial sport organization governing fencing in New Brunswick, operating as the provincial branch of the Canadian Fencing Federation. FENB is a member of Sport New Brunswick and is governed by a seven-member volunteer board under the FENB Bylaws, following Carver policy governance principles."
about_affiliations_title: "Affiliations"
about_mission_label:      "Our Mission"
about_mission_title:      "FENB's Mission Statement"
about_mission_quote:      "To encourage people in New Brunswick to participate in and enjoy the sport of fencing, both recreationally and competitively, in a safe environment at a reasonable cost."
about_history_label:      "History"
about_history_title:      "Origins of Fencing in New Brunswick"
about_history_body:       "The provincial fencing association was officially established as the New Brunswick Fencing Association in 1969. Its founding president, Alfred Knappe, had begun fencing in Hof, West Germany in 1950 before moving to Canada in 1955 and settling in Fredericton, where he coached at the University of New Brunswick starting in 1966. In 1969, Knappe united representatives from clubs in Fredericton, Saint John, and St. Andrews to establish the provincial association.\n\nNew Brunswick's first fencing tournament — the New Brunswick Championships — was held at the Fredericton YMCA on March 21, 1970 in conjunction with the New Brunswick Winter Games. The inaugural competition featured six male foil competitors, with Rick Gosselin winning to become the province's first provincial fencing champion."
