# ── Programs — Referee Development ────────────────
programs_referee_label:               "Referee Development"
programs_referee_intro:               "The Canadian Fencing Federation delegates provincial referee training and certification to provincial branches. FENB provides this certification assistance to its members through a structured two-level program for each weapon."
programs_referee_elements_label:      "Program Framework"
programs_referee_elements_title:      "Core program elements"
programs_referee_element_1:           "Recruit members as referees"
programs_referee_element_2:           "Educate candidates on referee knowledge"
programs_referee_element_3:           "Supply practical experience in clubs and competitions"
programs_referee_element_4:           "Provide mentorship from experienced referees"
programs_referee_element_5:           "Recognize referee contributions"
programs_referee_club_label:          "Club Level"
programs_referee_club_title:          "Club referee certification"
programs_referee_club_theory_title:   "Theory"
programs_referee_club_theory_body:    "Boundary rules, common penalties, right-of-way rules, basic terminology, and corner judge rules."
programs_referee_club_pract_title:    "Practical"
programs_referee_club_pract_body:     "Correct commands and movement with action, corner judge system operation, starting distance, recognition of yellow card offenses, and hitting accuracy of 75% across 10 bouts."
programs_referee_prov_label:          "Provincial Level"
programs_referee_prov_title:          "Provincial referee certification"
programs_referee_prov_theory1_title:  "Theory — Part 1 (6–7 hours)"
programs_referee_prov_theory1_body:   "Professionalism and role of the referee, responsibilities and rights, tournament procedures, and safety. No exam."
programs_referee_prov_theory2_title:  "Theory — Part 2 (6–7 hours)"
programs_referee_prov_theory2_body:   "General rules covering equipment, penalties, injuries, hit annulment, team competition, and terminology. Written exam required (75% pass)."
programs_referee_prov_theory3_title:  "Theory — Part 3 (9–12 hours)"
programs_referee_prov_theory3_body:   "Weapon-specific training with written exam (75% pass)."
programs_referee_prov_pract_title:    "Practical Evaluation"
programs_referee_prov_pract_body:     "Judge three 5-hit bouts and one 15-hit bout between experienced fencers."
programs_referee_prov_cert_title:     "Certification Pathway"
programs_referee_prov_cert_body:      "Candidates progress through supervised tournament refereeing (minimum 12 hours across 4 tournaments), a practice exam evaluation, and a provincial exam under out-of-province evaluation."

# ── Programs — Secretariat Development ────────────
programs_secretariat_label:           "Secretariat Development"
programs_secretariat_intro:           "The secretariat — also called the bout committee, directoire technique, or tournament secretariat — is the administrative and technical backbone of fencing competitions. Their work is primarily organizational and clerical, rather than refereeing."
programs_secretariat_duties_label:    "Responsibilities"
programs_secretariat_duties_title:    "What the secretariat does"
programs_secretariat_duty_1_title:    "Registration"
programs_secretariat_duty_1_desc:     "Verifying fencer licences and membership eligibility."
programs_secretariat_duty_2_title:    "Seeding"
programs_secretariat_duty_2_desc:     "Creating pools and brackets using current rankings."
programs_secretariat_duty_3_title:    "Scheduling"
programs_secretariat_duty_3_desc:     "Setting bout times and assigning officials and equipment."
programs_secretariat_duty_4_title:    "Documentation"
programs_secretariat_duty_4_desc:     "Collecting results and updating tournament brackets."
programs_secretariat_duty_5_title:    "Announcements"
programs_secretariat_duty_5_desc:     "Posting results and official notices."
programs_secretariat_duty_6_title:    "Operations"
programs_secretariat_duty_6_desc:     "Coordinating equipment oversight, medical support, and referee functions."
programs_secretariat_duty_7_title:    "Administrative Enforcement"
programs_secretariat_duty_7_desc:     "Processing withdrawals, no-show penalties, and procedural disputes."
programs_secretariat_mission:         "The secretariat ensures competition structure, paperwork, and flow are correct — so referees and fencers can focus on the bouts."

# ── Programs — Armourer Development ───────────────
programs_armourer_label:              "Armourer Development"
programs_armourer_intro:              "The armourer — also called the weapons master or technician — is the technician and safety officer of fencing, responsible for the safety, compliance, and maintenance of equipment used in competitions and clubs."
programs_armourer_pre_label:          "Pre-Competition"
programs_armourer_pre_title:          "Equipment control"
programs_armourer_pre_body:           "The armourer validates weapons (foils, épées, sabres) for regulatory compliance regarding dimensions, weight, flexibility, tip pressure, and electrical function. Protective gear — masks, jackets, gloves, lamés, body wires — is reviewed against safety standards. Approved equipment receives control marks."
programs_armourer_during_label:       "During Competition"
programs_armourer_during_title:       "Technical support"
programs_armourer_during_body:        "The armourer repairs or replaces defective weapons, body wires, or scoring devices; advises referees on equipment disputes; and maintains the operational status of scoring boxes, reels, and cables."
programs_armourer_safety_label:       "Safety"
programs_armourer_safety_title:       "Safety assurance"
programs_armourer_safety_body:        "The armourer prevents use of unsafe equipment — broken blades, damaged masks — and verifies that electrical contact and resistance meet regulatory standards."
