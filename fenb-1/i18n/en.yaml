programs_cwg_rankings_label:          "Rankings"
programs_cwg_rankings_title:          "Athlete rankings"
programs_cwg_rankings_body_intro:     "Selection points are earned at sanctioned competitions throughout the selection period. An athlete's ranking is determined by three components:"
programs_cwg_rankings_p1_heading:     "1. Participation points"
programs_cwg_rankings_p1_body:        "The 1st-place finisher earns points equal to the number of competitors. Each subsequent place earns one point less (2nd earns N−1, 3rd earns N−2, etc.). Bronze medal winners both receive the same score. Points are awarded only to athletes who finish in the top 50% of the field."
programs_cwg_rankings_p2_heading:     "2. Round progression points"
programs_cwg_rankings_p2_body:        "A fencer earns additional points each time they win an elimination-round bout, awarded cumulatively as they advance through the table (rounds of 64, 32, 16, 8, 4, 2, and 1). Again, only athletes finishing in the top 50% of the field earn these points."
programs_cwg_rankings_p3_heading:     "3. Competition scaling"
programs_cwg_rankings_p3_body:        "Total points (participation + progression) are multiplied by a scaling factor based on the competition level:"
programs_cwg_rankings_scale_local:    "1.0× — NB and Maritime local events"
programs_cwg_rankings_scale_regional: "1.8× — NB Provincials, Québec/Ontario/US regional events"
programs_cwg_rankings_scale_national: "2.5× — Cadet Nationals, Canada Cups"
programs_cwg_rankings_points_note:    "Only Under-17 events are counted. Athletes are ranked by their best results across the selection period. Full details and the complete appeals policy are in the Team Plan."
