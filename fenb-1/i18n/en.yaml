programs_athlete_pathway_body:        "Two of our key LTAD programs are the Provincial Team and High Performance Team development pathways. Young athletes who are invited to join these advanced programs receive additional opportunities to train and compete, and act as ambassadors for our province when competing on a national and international level."
# ── Programs — Coach Training ──────────────────────
programs_coach_label:                 "Coaching Pathways"
programs_coach_intro:                 "Coaches are essential to athlete development. FENB supports three coaching streams aligned with the Canadian Fencing Federation's coaching framework."
programs_coach_pathway_overview_title:                 "Coach Development Model"
programs_coach_pathway_overview_desc:                  "See how the Community, Instructional, and Competition coaching pathways connect — from your first workshop through to certification at each level."
programs_coach_pathway_community_title:                "Community Instructor"
programs_coach_pathway_community_desc:                 "For instructors who want to introduce fencing to new participants. This pathway focuses on teaching in a group setting and creating a fun, cooperative environment for beginners to learn fencing fundamentals — a great starting point for new coaches."
programs_coach_pathway_instructor_beginner_title:      "Instructor – Beginner"
programs_coach_pathway_instructor_beginner_desc:       "For instructors with solid personal fencing skills (yellow & orange armband) who want to guide fencers from initiation through the basic technical-tactical repertoire, keeping participants of all ages engaged."
programs_coach_pathway_competition_introduction_title: "Competition Introduction Coach"
programs_coach_pathway_competition_introduction_desc:  "For coaches who want to introduce and develop fencers for competition. Covers building a competitive coaching profile, planning practices, designing a competitive program, and supporting fencers at provincial and national events."
programs_coach_pathway_competition_development_title:  "Competition Development Coach"
programs_coach_pathway_competition_development_desc:   "For coaches working with competitive fencers in the Train-to-Compete stage. Addresses performance gaps through technical-tactical, psychological, and physical development — required to coach at a Canada Games."
programs_coach_pathway_learn_more:    "Learn more"
