# ── Programs — Athlete Development ────────────────
programs_athlete_label:               "Long-Term Athlete Development"
programs_athlete_intro:               "Canadian Sport for Life (CS4L) is a movement to promote a healthy, physically literate nation. Long-Term Athlete Development (LTAD) is a seven-stage training, competition, and recovery pathway that guides athletes from infancy through adulthood at all ability levels."
programs_athlete_ltad_label:          "Key Factors"
