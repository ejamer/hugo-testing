# ── Programmes — Développement des arbitres ───────
programs_referee_label:               "Développement des arbitres"
programs_referee_intro:               "La Fédération canadienne d'escrime délègue la formation et la certification provinciales des arbitres aux branches provinciales. La FENB offre cette aide à la certification à ses membres grâce à un programme structuré à deux niveaux pour chaque arme."
programs_referee_elements_label:      "Cadre du programme"
programs_referee_elements_title:      "Éléments fondamentaux"
programs_referee_element_1:           "Recruter des membres comme arbitres"
programs_referee_element_2:           "Former les candidats sur les connaissances arbitrales"
programs_referee_element_3:           "Offrir une expérience pratique en clubs et en compétitions"
programs_referee_element_4:           "Assurer un mentorat par des arbitres expérimentés"
programs_referee_element_5:           "Reconnaître les contributions des arbitres"
programs_referee_club_label:          "Niveau club"
programs_referee_club_title:          "Certification d'arbitre de club"
programs_referee_club_theory_title:   "Théorie"
programs_referee_club_theory_body:    "Règles de délimitation, pénalités courantes, règles de priorité, terminologie de base et règles de juge de coin."
programs_referee_club_pract_title:    "Pratique"
programs_referee_club_pract_body:     "Commandes correctes et déplacement avec l'action, utilisation du système de juge de coin, distance de départ correcte, reconnaissance des infractions à la carte jaune, et précision de touche de 75 % sur 10 assauts."
programs_referee_prov_label:          "Niveau provincial"
programs_referee_prov_title:          "Certification d'arbitre provincial"
programs_referee_prov_theory1_title:  "Théorie — Partie 1 (6-7 heures)"
programs_referee_prov_theory1_body:   "Professionnalisme et rôle de l'arbitre, responsabilités et droits, procédures de tournoi et sécurité. Aucun examen."
programs_referee_prov_theory2_title:  "Théorie — Partie 2 (6-7 heures)"
programs_referee_prov_theory2_body:   "Règles générales couvrant l'équipement, les pénalités, les blessures, l'annulation de touche, la compétition par équipes et la terminologie. Examen écrit requis (note de passage : 75 %)."
programs_referee_prov_theory3_title:  "Théorie — Partie 3 (9-12 heures)"
programs_referee_prov_theory3_body:   "Formation sur les armes spécifiques avec examen écrit (note de passage : 75 %)."
programs_referee_prov_pract_title:    "Évaluation pratique"
programs_referee_prov_pract_body:     "Arbitrer trois assauts de 5 touches et un assaut de 15 touches entre des escrimeurs expérimentés."
programs_referee_prov_cert_title:     "Parcours de certification"
programs_referee_prov_cert_body:      "Les candidats progressent par l'arbitrage supervisé en tournoi (minimum 12 heures sur 4 tournois), une évaluation à l'examen pratique et un examen provincial sous évaluation hors province."

# ── Programmes — Développement du secrétariat ─────
programs_secretariat_label:           "Développement du secrétariat"
programs_secretariat_intro:           "Le secrétariat — aussi appelé comité d'assaut, directoire technique ou secrétariat de tournoi — est le pivot administratif et technique des compétitions d'escrime. Son travail est principalement organisationnel et administratif, plutôt qu'arbitral."
programs_secretariat_duties_label:    "Responsabilités"
programs_secretariat_duties_title:    "Rôle du secrétariat"
programs_secretariat_duty_1_title:    "Inscription"
programs_secretariat_duty_1_desc:     "Vérification des licences et de l'admissibilité des escrimeurs."
programs_secretariat_duty_2_title:    "Classement et poules"
programs_secretariat_duty_2_desc:     "Création des poules et des tableaux à partir des classements en vigueur."
programs_secretariat_duty_3_title:    "Planification"
programs_secretariat_duty_3_desc:     "Établissement des horaires d'assauts et attribution des officiels et de l'équipement."
programs_secretariat_duty_4_title:    "Documentation"
programs_secretariat_duty_4_desc:     "Collecte des résultats et mise à jour des tableaux de tournoi."
programs_secretariat_duty_5_title:    "Annonces"
programs_secretariat_duty_5_desc:     "Affichage des résultats et des avis officiels."
programs_secretariat_duty_6_title:    "Opérations"
programs_secretariat_duty_6_desc:     "Coordination de la surveillance de l'équipement, du soutien médical et des fonctions arbitrales."
programs_secretariat_duty_7_title:    "Application des règlements"
programs_secretariat_duty_7_desc:     "Traitement des retraits, des pénalités pour absence et des litiges de procédure."
programs_secretariat_mission:         "Le secrétariat veille à ce que la structure, la paperasse et le déroulement de la compétition soient corrects — pour que les arbitres et les escrimeurs puissent se concentrer sur les assauts."

# ── Programmes — Développement des armuriers ──────
programs_armourer_label:              "Développement des armuriers"
programs_armourer_intro:              "L'armurier — aussi appelé maître d'armes ou technicien — est le technicien et l'agent de sécurité de l'escrime, responsable de la sécurité, de la conformité et de l'entretien de l'équipement utilisé en compétition et dans les clubs."
programs_armourer_pre_label:          "Avant la compétition"
programs_armourer_pre_title:          "Contrôle de l'équipement"
programs_armourer_pre_body:           "L'armurier valide les armes (fleurets, épées, sabres) quant à leur conformité réglementaire en matière de dimensions, de poids, de souplesse, de pression de pointe et de fonctionnement électrique. Les équipements de protection — masques, vestes, gants, lamés, fils de corps — sont vérifiés selon les normes de sécurité. L'équipement approuvé reçoit des marques de contrôle."
programs_armourer_during_label:       "Pendant la compétition"
programs_armourer_during_title:       "Soutien technique"
programs_armourer_during_body:        "L'armurier répare ou remplace les armes, fils de corps ou appareils de pointage défectueux, conseille les arbitres sur les litiges d'équipement et maintient le bon fonctionnement des boîtiers de signalisation, bobines et câbles."
programs_armourer_safety_label:       "Sécurité"
programs_armourer_safety_title:       "Assurance de la sécurité"
programs_armourer_safety_body:        "L'armurier empêche l'utilisation d'équipement dangereux — lames brisées, masques endommagés — et vérifie que le contact électrique et la résistance respectent les normes réglementaires."
programs_armourer_club_label:         "Niveau club"
programs_armourer_club_title:         "Armurerie au niveau du club"
programs_armourer_club_body:          "Au niveau du club, l'armurier entretient l'inventaire d'équipement et éduque les escrimeurs sur les soins appropriés et l'inspection du matériel."
