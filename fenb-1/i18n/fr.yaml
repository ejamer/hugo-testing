# ── Page à propos ──────────────────────────────────────────
about_overview_label:     "Notre organisation"
about_overview_title:     "Escrime-Fencing NB"
about_overview_body:      "Escrime-Fencing NB (FENB) est l'organisation sportive provinciale régissant l'escrime au Nouveau-Brunswick, agissant à titre de section provinciale de la Fédération canadienne d'escrime. FENB est membre de Sport Nouveau-Brunswick et est régie par un conseil d'administration bénévole de sept membres en vertu des Règlements de FENB, selon les principes de gouvernance Carver."
about_affiliations_title: "Affiliations"
about_mission_label:      "Notre mission"
about_mission_title:      "Énoncé de mission de FENB"
about_mission_quote:      "Encourager les gens du Nouveau-Brunswick à pratiquer et apprécier l'escrime, tant à titre récréatif que compétitif, dans un environnement sécuritaire et à un coût raisonnable."
about_history_label:      "Histoire"
about_history_title:      "Les origines de l'escrime au Nouveau-Brunswick"
about_history_founder_caption: "Alfred Knappe — président fondateur, 1969"
about_history_body:       "L'association provinciale d'escrime a été officiellement fondée sous le nom de New Brunswick Fencing Association en 1969. Son premier président, Alfred Knappe, avait commencé à pratiquer l'escrime à Hof, en Allemagne de l'Ouest, en 1950, avant de s'établir au Canada en 1955 à Fredericton, où il entraîna à l'Université du Nouveau-Brunswick à partir de 1966. En 1969, Knappe réunit des représentants des clubs de Fredericton, de Saint John et de St. Andrews pour fonder l'association provinciale.\n\nLe premier tournoi d'escrime du Nouveau-Brunswick — les Championnats provinciaux — eut lieu au YMCA de Fredericton le 21 mars 1970, dans le cadre des Jeux d'hiver du Nouveau-Brunswick. La compétition inaugurale regroupait six compétiteurs masculins au fleuret; Rick Gosselin remporta la victoire et devint le premier champion provincial d'escrime de la province."
about_board_label:        "Direction"
about_board_title:        "Conseil d'administration"
about_board_season:       "2025–2026"
about_governance_label:   "Gouvernance"
about_governance_title:   "Politiques, plans et rapports"
about_contact_label:      "Nous joindre"
about_contact_title:      "Contacter FENB"

