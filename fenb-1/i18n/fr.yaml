programs_cwg_team_plan_fr:            "Plan d'équipe 2027 – Jeux du Canada (français)"
programs_cwg_financial_title:         "Aide financière"
programs_cwg_financial_body:          "Une aide financière est disponible pour les athlètes participant au programme de sélection afin de contribuer aux frais de déplacement hors province."
