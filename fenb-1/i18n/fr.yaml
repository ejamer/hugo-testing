programs_cwg_rankings_label:          "Classements"
programs_cwg_rankings_title:          "Classements des athlètes"
programs_cwg_rankings_body_intro:     "Les points de sélection sont accumulés lors de compétitions sanctionnées tout au long de la période de sélection. Le classement d'un athlète est déterminé par trois composantes :"
programs_cwg_rankings_p1_heading:     "1. Points de participation"
programs_cwg_rankings_p1_body:        "Le finisseur en 1re place obtient autant de points qu'il y a de compétiteurs. Chaque place suivante obtient un point de moins (2e obtient N−1, 3e obtient N−2, etc.). Les deux médaillés de bronze reçoivent le même score. Les points sont accordés uniquement aux athlètes qui terminent dans le top 50 % du tableau."
programs_cwg_rankings_p2_heading:     "2. Points de progression par tour"
programs_cwg_rankings_p2_body:        "Un escrimeur gagne des points supplémentaires chaque fois qu'il remporte un duel en élimination directe, accordés de façon cumulative au fil de son avancement (tours de 64, 32, 16, 8, 4, 2 et 1). Encore une fois, seuls les athlètes terminant dans le top 50 % du tableau obtiennent ces points."
programs_cwg_rankings_p3_heading:     "3. Coefficient de compétition"
programs_cwg_rankings_p3_body:        "Les points totaux (participation + progression) sont multipliés par un coefficient selon le niveau de la compétition :"
programs_cwg_rankings_scale_local:    "1,0× — Événements locaux du N.-B. et des Maritimes"
programs_cwg_rankings_scale_regional: "1,8× — Provinciaux du N.-B., événements régionaux du Québec/Ontario/É.-U."
programs_cwg_rankings_scale_national: "2,5× — Championnats nationaux cadets, Coupes du Canada"
programs_cwg_rankings_points_note:    "Seules les épreuves Moins de 17 ans sont comptabilisées. Les athlètes sont classés selon leurs meilleurs résultats durant la période de sélection. Les détails complets et la politique d'appel se trouvent dans le plan d'équipe."
