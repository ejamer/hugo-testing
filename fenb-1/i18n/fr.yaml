join_membership_label:        "Inscription des membres"
join_membership_intro:        "Tous les escrimeurs, entraîneurs et officiels actifs au Nouveau-Brunswick doivent s'inscrire comme membres FENB chaque saison. L'inscription et le paiement s'effectuent via le portail 2MEV — le système officiel de gestion des adhésions de FENB."
