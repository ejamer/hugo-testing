programs_cwg_elig_title:              "Qui peut participer"
programs_cwg_elig_body:               "Les athlètes nés en 2010 ou après, dans toutes les armes, sont admissibles au programme de sélection. Tous les athlètes participants bénéficient d'une précieuse expérience compétitive, quelle que soit la sélection finale."
programs_cwg_docs_body:               "Les détails complets sur les critères d'admissibilité, le processus de sélection, l'évaluation des athlètes et la composition de l'équipe se trouvent dans les documents du plan d'équipe."
programs_cwg_resources_label:         "Documents"
programs_cwg_resources_title:         "Plan d'équipe et documents de sélection"
