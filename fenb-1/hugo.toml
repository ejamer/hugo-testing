# baseURL is set per environment:
#   config/development/hugo.toml → https://ejamer.github.io/hugo-testing/
#   config/production/hugo.toml  → https://fenb.ca/

defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
theme = 'ananke'

[outputs]
  home    = ["HTML"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]

[markup]
  [markup.goldmark.renderer]
    # Keep unsafe = false — content authors should not need raw HTML in Markdown.
    # If a specific page needs an embed or iframe, use a shortcode instead.
    unsafe = false

  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4

[params]
  background_color_class = "bg-fenb-teal"

  [params.announcement]
    enabled    = true
    bg_color   = "#cc0000"
    text_color = "#ffffff"
    text_en    = "** DRAFT ** — Exploring website update options; please visit our official site at: https://www.fencingnb.ca/ — ** DRAFT **"
    text_fr    = "** BROUILLON ** — Exploration des options de mise à jour du site; veuillez visiter notre site officiel à : https://www.fencingnb.ca/ — ** BROUILLON **"

  [params.ananke]
    show_recent_posts = false
    custom_css = [
      "fenb-base.css",
      "fenb-nav.css",
      "fenb-hero.css",
      "fenb-events.css",
      "fenb-news.css",
      "fenb-clubs.css",
      "fenb-about.css",
      "fenb-hof.css",
      "fenb-schedule.css",
      "fenb-join.css",
      "fenb-programs.css",
      "fenb-responsive.css",
    ]

  [params.ananke.social.follow]
    networks = ["facebook"]

  [params.ananke.social.facebook]
    profilelink = "https://www.facebook.com/FencingEscrimeNB"

